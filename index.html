<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ForPenSec Consulting & Technologies — Digital Forensics, Penetration Testing and Cybersecurity Consulting in India.">
  <meta name="keywords" content="forensics, penetration testing, cybersecurity, firewall, VPN, India, Pondicherry">
  <title>ForPenSec Consulting & Technologies</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#0a1628">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #0a1628;
      --navy2:  #0d1f3c;
      --blue:   #1a73e8;
      --blue2:  #1557b0;
      --teal:   #1D9E75;
      --orange: #d85a30;
      --light:  #e8f0fe;
      --gray:   #f4f6f9;
      --text:   #2c3e50;
      --muted:  #5a7a9a;
      --white:  #ffffff;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      color: var(--text);
      background: var(--white);
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: rgba(10,22,40,0.97);
      backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 5%;
      height: 64px;
      border-bottom: 2px solid var(--blue);
    }
    .nav-logo {
      display: flex; align-items: center; gap: 12px; text-decoration: none;
    }
    .nav-logo img { height: 42px; width: 42px; object-fit: contain; }
    .nav-brand { color: white; font-size: 1.2rem; font-weight: 700; letter-spacing: 0.5px; }
    .nav-brand span { color: var(--blue); }
    .nav-links { display: flex; gap: 28px; list-style: none; }
    .nav-links a {
      color: #b0c4d8; text-decoration: none; font-size: 0.9rem;
      letter-spacing: 0.5px; transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--blue); }
    .nav-cta {
      background: var(--blue); color: white !important;
      padding: 8px 18px; border-radius: 6px; font-weight: 600 !important;
    }
    .nav-cta:hover { background: var(--blue2) !important; color: white !important; }
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; }
    .hamburger span { width: 24px; height: 2px; background: white; border-radius: 2px; transition: 0.3s; }

    /* ── HERO ── */
    #home {
      min-height: 100vh;
      background: linear-gradient(135deg, #050d1a 0%, #0a1628 50%, #0d1f3c 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: 100px 5% 60px;
      position: relative; overflow: hidden;
    }
    #home::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 70% 40%, rgba(26,115,232,0.12) 0%, transparent 60%),
                  radial-gradient(ellipse at 20% 70%, rgba(29,158,117,0.08) 0%, transparent 50%);
    }
    .hero-grid {
      position: absolute; inset: 0; opacity: 0.04;
      background-image: linear-gradient(rgba(26,115,232,0.8) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(26,115,232,0.8) 1px, transparent 1px);
      background-size: 50px 50px;
    }
    .hero-content { position: relative; z-index: 1; max-width: 800px; }
    .hero-logo { width: 130px; height: 130px; object-fit: contain; margin-bottom: 24px;
      filter: drop-shadow(0 0 30px rgba(26,115,232,0.4)); animation: float 4s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    .hero-tagline {
      display: inline-flex; gap: 8px; align-items: center;
      background: rgba(26,115,232,0.15); border: 1px solid rgba(26,115,232,0.3);
      color: var(--blue); font-size: 0.8rem; letter-spacing: 3px;
      padding: 6px 16px; border-radius: 20px; margin-bottom: 20px;
    }
    .hero-tagline::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--teal); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800; color: white; line-height: 1.2;
      margin-bottom: 16px;
    }
    .hero h1 span { color: var(--blue); }
    .hero-sub {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: #7ab3e0; margin-bottom: 12px; line-height: 1.6;
    }
    .hero-motto {
      color: #4a7a9a; font-size: 0.9rem; letter-spacing: 3px;
      text-transform: uppercase; margin-bottom: 36px;
    }
    .hero-motto span { color: var(--teal); }
    .hero-btns { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
    .btn-primary {
      background: var(--blue); color: white;
      padding: 14px 32px; border-radius: 8px;
      text-decoration: none; font-weight: 700; font-size: 1rem;
      transition: all 0.2s; border: 2px solid var(--blue);
    }
    .btn-primary:hover { background: var(--blue2); border-color: var(--blue2); transform: translateY(-2px); }
    .btn-outline {
      background: transparent; color: white;
      padding: 14px 32px; border-radius: 8px;
      text-decoration: none; font-weight: 600; font-size: 1rem;
      border: 2px solid rgba(255,255,255,0.3); transition: all 0.2s;
    }
    .btn-outline:hover { border-color: white; transform: translateY(-2px); }
    .hero-stats {
      display: flex; gap: 40px; justify-content: center;
      margin-top: 56px; flex-wrap: wrap;
    }
    .stat { text-align: center; }
    .stat-num { font-size: 2rem; font-weight: 800; color: var(--blue); }
    .stat-label { font-size: 0.8rem; color: #4a7a9a; letter-spacing: 1px; text-transform: uppercase; margin-top: 4px; }
    .accent-line {
      width: 100%; height: 3px;
      background: linear-gradient(90deg, var(--blue), var(--teal), var(--orange));
      position: absolute; bottom: 0; left: 0;
    }

    /* ── SECTIONS ── */
    section { padding: 80px 5%; }
    .section-tag {
      display: inline-block;
      background: var(--light); color: var(--blue);
      font-size: 0.75rem; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; padding: 6px 14px; border-radius: 20px;
      margin-bottom: 12px;
    }
    .section-title {
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      font-weight: 800; color: var(--navy); margin-bottom: 12px;
    }
    .section-title span { color: var(--blue); }
    .section-sub { color: var(--muted); font-size: 1rem; max-width: 560px; line-height: 1.7; margin-bottom: 48px; }
    .text-center { text-align: center; }
    .text-center .section-sub { margin-left: auto; margin-right: auto; }
    .divider {
      width: 50px; height: 4px; border-radius: 2px;
      background: linear-gradient(90deg, var(--blue), var(--teal));
      margin: 16px 0 40px;
    }
    .divider.center { margin-left: auto; margin-right: auto; }

    /* ── SERVICES ── */
    #services { background: var(--gray); }
    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
    }
    .service-card {
      background: white; border-radius: 12px;
      padding: 32px 24px;
      border: 1px solid #e0e8f0;
      border-top: 4px solid var(--blue);
      transition: all 0.3s;
      position: relative; overflow: hidden;
    }
    .service-card::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--blue), var(--teal));
      transform: scaleX(0); transition: transform 0.3s; transform-origin: left;
    }
    .service-card:hover { transform: translateY(-6px); box-shadow: 0 16px 40px rgba(26,115,232,0.12); border-top-color: var(--teal); }
    .service-card:hover::after { transform: scaleX(1); }
    .service-icon {
      width: 56px; height: 56px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; margin-bottom: 18px;
    }
    .icon-blue { background: rgba(26,115,232,0.1); }
    .icon-teal { background: rgba(29,158,117,0.1); }
    .icon-orange { background: rgba(216,90,48,0.1); }
    .icon-navy { background: rgba(10,22,40,0.08); }
    .service-card h3 { font-size: 1.1rem; font-weight: 700; color: var(--navy); margin-bottom: 10px; }
    .service-card p { color: var(--muted); font-size: 0.9rem; line-height: 1.7; }
    .service-tag {
      display: inline-block; margin-top: 14px;
      font-size: 0.72rem; font-weight: 700; letter-spacing: 1px;
      padding: 4px 10px; border-radius: 10px;
    }
    .tag-blue { background: var(--light); color: var(--blue); }
    .tag-teal { background: rgba(29,158,117,0.1); color: var(--teal); }
    .tag-orange { background: rgba(216,90,48,0.1); color: var(--orange); }
    .tag-navy { background: rgba(10,22,40,0.07); color: var(--navy); }

    /* ── WHY US ── */
    #why { background: white; }
    .why-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 48px; align-items: center;
    }
    .why-points { display: flex; flex-direction: column; gap: 20px; }
    .why-point {
      display: flex; gap: 16px; align-items: flex-start;
      padding: 20px; border-radius: 10px;
      background: var(--gray); border-left: 4px solid var(--blue);
      transition: all 0.2s;
    }
    .why-point:hover { background: var(--light); border-left-color: var(--teal); }
    .why-icon { font-size: 1.4rem; flex-shrink: 0; margin-top: 2px; }
    .why-point h4 { font-size: 1rem; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
    .why-point p { font-size: 0.88rem; color: var(--muted); line-height: 1.6; }
    .why-visual {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
      border-radius: 16px; padding: 40px;
      display: flex; flex-direction: column; gap: 20px;
      position: relative; overflow: hidden;
    }
    .why-visual::before {
      content: ''; position: absolute; top: -40px; right: -40px;
      width: 200px; height: 200px; border-radius: 50%;
      background: rgba(26,115,232,0.1);
    }
    .metric {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 18px; background: rgba(255,255,255,0.06);
      border-radius: 8px; border: 1px solid rgba(255,255,255,0.08);
    }
    .metric-label { color: #7ab3e0; font-size: 0.88rem; }
    .metric-val { color: white; font-weight: 700; font-size: 1rem; }
    .metric-bar {
      height: 4px; border-radius: 2px; margin-top: 8px;
      background: rgba(255,255,255,0.1);
    }
    .metric-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--blue), var(--teal)); }

    /* ── ABOUT ── */
    #about { background: var(--gray); }
    .about-grid {
      display: grid; grid-template-columns: 1fr 1.6fr;
      gap: 56px; align-items: center;
    }
    .about-card {
      background: linear-gradient(135deg, var(--navy), var(--navy2));
      border-radius: 16px; padding: 40px;
      text-align: center; border: 1px solid rgba(26,115,232,0.2);
    }
    .about-avatar {
      width: 100px; height: 100px; border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), var(--teal));
      display: flex; align-items: center; justify-content: center;
      font-size: 2.4rem; font-weight: 800; color: white;
      margin: 0 auto 20px;
    }
    .about-name { color: white; font-size: 1.3rem; font-weight: 700; margin-bottom: 6px; }
    .about-title { color: var(--blue); font-size: 0.85rem; letter-spacing: 1px; margin-bottom: 20px; }
    .about-badges { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .badge {
      background: rgba(26,115,232,0.15); color: #7ab3e0;
      font-size: 0.72rem; padding: 4px 10px; border-radius: 10px;
      border: 1px solid rgba(26,115,232,0.2);
    }
    .about-text p { color: var(--muted); line-height: 1.8; margin-bottom: 16px; font-size: 0.95rem; }
    .about-text strong { color: var(--navy); }
    .expertise-list {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; margin-top: 24px;
    }
    .expertise-item {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.88rem; color: var(--text);
    }
    .expertise-item::before {
      content: '✓'; color: var(--teal);
      font-weight: 700; font-size: 0.9rem;
    }

    /* ── CONTACT ── */
    #contact { background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%); }
    #contact .section-title { color: white; }
    #contact .section-sub { color: #7ab3e0; }
    #contact .section-tag { background: rgba(26,115,232,0.2); color: #7ab3e0; }
    .contact-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 48px; align-items: start;
    }
    .contact-info { display: flex; flex-direction: column; gap: 20px; }
    .contact-item {
      display: flex; gap: 16px; align-items: flex-start;
      padding: 20px; border-radius: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      transition: all 0.2s;
    }
    .contact-item:hover { background: rgba(26,115,232,0.1); border-color: rgba(26,115,232,0.3); }
    .contact-icon {
      width: 42px; height: 42px; border-radius: 8px;
      background: rgba(26,115,232,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; flex-shrink: 0;
    }
    .contact-item h4 { color: #7ab3e0; font-size: 0.78rem; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
    .contact-item a, .contact-item p { color: white; text-decoration: none; font-size: 0.95rem; }
    .contact-item a:hover { color: var(--blue); }
    .contact-form { background: white; border-radius: 16px; padding: 36px; }
    .contact-form h3 { font-size: 1.2rem; font-weight: 700; color: var(--navy); margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.5px; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 10px 14px; border-radius: 8px;
      border: 1.5px solid #e0e8f0; font-size: 0.9rem;
      font-family: inherit; color: var(--text);
      transition: border-color 0.2s; outline: none;
      background: #fafbfc;
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
      border-color: var(--blue); background: white;
    }
    .form-group textarea { height: 100px; resize: vertical; }
    .btn-submit {
      width: 100%; background: var(--blue); color: white;
      padding: 12px; border-radius: 8px; border: none;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      transition: all 0.2s; font-family: inherit;
    }
    .btn-submit:hover { background: var(--blue2); transform: translateY(-1px); }

    /* ── FOOTER ── */
    footer {
      background: #050d1a;
      padding: 40px 5% 24px;
      border-top: 1px solid rgba(26,115,232,0.2);
    }
    .footer-top {
      display: flex; justify-content: space-between; align-items: center;
      padding-bottom: 24px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-wrap: wrap; gap: 20px;
    }
    .footer-brand { display: flex; align-items: center; gap: 12px; }
    .footer-brand img { height: 44px; }
    .footer-brand-text .name { color: white; font-weight: 700; font-size: 1.1rem; }
    .footer-brand-text .name span { color: var(--blue); }
    .footer-brand-text .sub { color: #4a6f8a; font-size: 0.78rem; letter-spacing: 1px; }
    .footer-links { display: flex; gap: 24px; }
    .footer-links a { color: #4a6f8a; text-decoration: none; font-size: 0.85rem; transition: color 0.2s; }
    .footer-links a:hover { color: var(--blue); }
    .footer-bottom {
      display: flex; justify-content: space-between; align-items: center;
      padding-top: 20px; flex-wrap: wrap; gap: 10px;
    }
    .footer-copy { color: #2a3a4a; font-size: 0.8rem; }
    .footer-tagline {
      display: flex; gap: 16px;
    }
    .footer-tagline span {
      font-size: 0.75rem; letter-spacing: 2px; color: #2a3a4a;
    }
    .footer-tagline .dot { color: var(--blue); }
    .accent-bar {
      height: 3px;
      background: linear-gradient(90deg, var(--blue), var(--teal), var(--orange));
    }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      .nav-links { display: none; flex-direction: column; gap: 0;
        position: absolute; top: 64px; left: 0; right: 0;
        background: rgba(10,22,40,0.98); padding: 12px 0; }
      .nav-links.open { display: flex; }
      .nav-links li a { display: block; padding: 12px 5%; border-bottom: 1px solid rgba(255,255,255,0.05); }
      .hamburger { display: flex; }
      .why-grid, .about-grid, .contact-grid { grid-template-columns: 1fr; }
      .expertise-list { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr; }
      .footer-top, .footer-bottom { flex-direction: column; text-align: center; }
      .footer-links { flex-wrap: wrap; justify-content: center; }
      section { padding: 56px 5%; }
    }
  </style>
</head>
<body>

<!-- NAV -->
